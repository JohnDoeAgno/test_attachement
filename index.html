        body {

        }

        .main-container {
            width: 95%; /* مرونة كاملة للجوال */

            margin: 0 auto;
            padding: 10px 5px;
        }

        .glass-card {
            background: linear-gradient(145deg, #111827, #1e293b);

            border-radius: 20px;
            padding: 25px 20px; /* مسافات أقل للجوال */
        }

        @media (min-width: 640px) {
            .glass-card {
                padding: 40px;
                border-radius: 24px;
            }
            .main-container {
                padding: 20px;
            }
        }

        .scenario-label {
            display: inline-block;
            background: #fbbf24;
            color: #000;
            font-weight: 900;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-bottom: 15px;
        }

        .question-text {
            /* خط كبير في الكمبيوتر وأصغر قليلاً في الجوال */
            font-size: clamp(1.15rem, 5vw, 1.6rem); 
            font-weight: 700;
            line-height: 1.5;
            color: #f8fafc;
            margin-bottom: 25px;
        }

        .option-btn {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 15px 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            font-size: clamp(0.95rem, 4vw, 1.15rem);
            font-weight: 600;
            color: #94a3b8;
            text-align: right;
            cursor: pointer;
        }

        .option-btn:hover, .option-btn:active {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
            color: #fbbf24;
        }

        .option-num {
            font-family: sans-serif;
            opacity: 0.3;
            font-weight: 900;
            font-size: 1rem;
            margin-right: 10px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            transition: width 0.3s ease;
        }

        .result-bar-bg {
            height: 10px;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 6px;
        }

        .result-bar-fill {
            height: 100%;
            transition: width 1s ease-out;
        }

        .signature {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #1e293b;
        }

        .signature-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .btn-start {
            background: #fbbf24;
            color: #070b14;
            font-weight: 900;
            font-size: 1.1rem;
            padding: 18px 35px;
            border-radius: 14px;
            transition: all 0.3s ease;
        }
    </style>
</head>

            { cat: "الاضطراب", text: "أقلق من أنني سأتأذى إذا سمحت لنفسي بالتعلق بشخص ما.", type: "disorganized" },

            { cat: "الاضطراب", text: "أجد صعوبة في التعرف على إشارات الأمان في الآخرين.", type: "disorganized" },
            { cat: "الاضطراب", text: "أشعر أنني 'مكسور' بطريقة لا يمكن إصلاحها.", type: "disorganized" },
            { cat: "الاضطراب", text: "أحتاج للتحكم في كل شيء لتجنب الشعور بالضعف.", type: "disorganized" }
        ];

        let currentIdx = 0;
        let userAnswers = [];

        function startQuiz() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQ();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('category-name').innerText = q.cat;
            document.getElementById('q-counter').innerText = `${String(currentIdx + 1).padStart(2, '0')} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function recordAnswer(v) {
            userAnswers.push({ type: questions[currentIdx].type, val: v });
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQ();
            } else {
                processResults();
            }
        }

        function processResults() {
            let scores = { safe: 0, anxious: 0, avoidant: 0, disorganized: 0 };
            let counts = { safe: 0, anxious: 0, avoidant: 0, disorganized: 0 };
            
            userAnswers.forEach(a => {
                scores[a.type] += a.val;
                counts[a.type]++;
            });

            const getPct = (t) => Math.round((scores[t] / (counts[t] * 5)) * 100);
            const res = { safe: getPct('safe'), anxious: getPct('anxious'), avoidant: getPct('avoidant'), disorganized: getPct('disorganized') };

            displayResults(res);
        }

        function displayResults(res) {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            ['safe', 'anxious', 'avoidant', 'disorganized'].forEach(t => {
                document.getElementById(`pct-${t}`).innerText = res[t] + "%";
                document.getElementById(`bar-${t}`).style.width = res[t] + "%";
            });

            let primary = 'safe';
            if (res.anxious > res[primary]) primary = 'anxious';
            if (res.avoidant > res[primary]) primary = 'avoidant';
            if (res.disorganized > res[primary]) primary = 'disorganized';

            const titles = { safe: "النمط الآمن", anxious: "النمط القلق", avoidant: "النمط التجنبي", disorganized: "النمط المضطرب" };
            const analyses = {
                safe: "أنت تمتلك أساساً قوياً من الأمان العاطفي. تستطيع الموازنة بين الحاجة للقرب والحفاظ على استقلاليتك، وتثق في نفسك وفي الآخرين.",
                anxious: "نمطك يميل للقلق والحساسية العالية تجاه أي تغير في القرب العاطفي. تحتاج لتطمين مستمر وتخشى الهجر، مما قد يرهقك عاطفياً.",
                avoidant: "تميل للحفاظ على مسافة أمان عاطفية وتعتبر الاعتماد على الآخرين ضعفاً. تقدس استقلاليتك وقد تبتعد عندما تصبح العلاقة جدية.",
                disorganized: "نمطك يتسم بصراع داخلي بين الرغبة الشديدة في القرب والخوف الشديد من الأذى. هذا يسبب تقلبات عاطفية وصعوبة في الشعور بالأمان الاستقرار."
            };

            document.getElementById('primary-style').innerText = titles[primary];
            document.getElementById('result-analysis').innerText = analyses[primary];
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

    <!-- GoatCounter Visit Counter -->
    <script>
        fetch('https://intrimind.goatcounter.com/counter/https://johndoeagno.github.io/test_attachement/.json')
            .then(r => r.json())
            .then(data => {
                const count = data.count || '0';
                document.getElementById('visit-count').innerText = Number(count.replace(/,/g, '')).toLocaleString('ar-DZ');
            })
            .catch(() => {
                document.getElementById('visit-count').innerText = '—';
            });
    </script>
</body>
</html>

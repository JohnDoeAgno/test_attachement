<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إختبار نمط التعلق - النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background: #fdfbfb;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .option-btn:active { transform: scale(0.97); }
        .progress-fill { transition: width 0.4s ease-in-out; }
        .result-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
        .result-bar-fill { height: 100%; transition: width 1s ease-out; }
        .logo-container { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; border: 2px solid #e2e8f0; background: #f8fafc; display: flex; align-items: center; justify-content: center; }
        .logo-small { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-4">

    <div id="app" class="max-w-xl w-full my-4">
        
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="glass-card rounded-[2rem] p-8 text-center">
            <div class="mb-6 inline-block p-4 bg-indigo-50 rounded-2xl text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.051.546M13 7.746V5a2 2 0 00-4 0v2.746M5 15a3 3 0 013-3h8a3 3 0 013 3v2a3 3 0 01-3 3H8a3 3 0 01-3-3v-2z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-4">اكتشف نمط تعلقك العاطفي</h1>
            <p class="text-gray-600 mb-6 leading-relaxed text-sm">
                هذا الاختبار مصمم لمساعدتك على فهم كيف تتعامل مع القرب، الثقة، والاستقلال في علاقاتك. أجب بصدق للحصول على أدق تحليل لمشاعرك.
            </p>
            <button onclick="startQuiz()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-8 rounded-2xl shadow-lg transition-all">
                ابدأ الاختبار الآن
            </button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="hidden glass-card rounded-[2rem] overflow-hidden flex flex-col">
            <div class="h-1.5 w-full bg-gray-100">
                <div id="progress-bar" class="progress-fill h-full bg-indigo-500 w-0"></div>
            </div>
            <div class="p-6 sm:p-10">
                <div class="flex justify-between items-center mb-6">
                    <span id="category-name" class="text-[10px] font-bold tracking-widest text-indigo-400 uppercase">جاري التحليل</span>
                    <span id="q-counter" class="text-xs text-gray-400 font-medium">1 / 72</span>
                </div>
                <h2 id="question-text" class="text-lg sm:text-xl font-semibold text-gray-800 mb-6 leading-snug min-h-[4rem]"></h2>
                <div id="options-container" class="space-y-2.5">
                    <button onclick="recordAnswer(1)" class="option-btn w-full p-4 rounded-xl border border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50/30 text-gray-700 text-sm font-medium">لا ينطبق أبداً <span>1</span></button>
                    <button onclick="recordAnswer(2)" class="option-btn w-full p-4 rounded-xl border border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50/30 text-gray-700 text-sm font-medium">ينطبق قليلاً <span>2</span></button>
                    <button onclick="recordAnswer(3)" class="option-btn w-full p-4 rounded-xl border border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50/30 text-gray-700 text-sm font-medium">ينطبق أحياناً <span>3</span></button>
                    <button onclick="recordAnswer(4)" class="option-btn w-full p-4 rounded-xl border border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50/30 text-gray-700 text-sm font-medium">ينطبق كثيراً <span>4</span></button>
                    <button onclick="recordAnswer(5)" class="option-btn w-full p-4 rounded-xl border border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50/30 text-gray-700 text-sm font-medium">ينطبق تماماً <span>5</span></button>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden glass-card rounded-[2rem] p-6 sm:p-10 text-center">
            <h2 class="text-sm font-medium text-gray-500 mb-1">التحليل النهائي للنمط</h2>
            <div id="primary-style" class="text-2xl font-bold text-indigo-600 mb-4"></div>
            
            <!-- Confidence Badge -->
            <div id="confidence-badge" class="inline-block px-3 py-1 rounded-full text-[10px] font-bold mb-6"></div>

            <div class="space-y-4 mb-8">
                <div class="text-right">
                    <div class="flex justify-between text-[10px] mb-1 font-bold text-gray-500 uppercase"><span>الآمن</span><span id="pct-safe">0%</span></div>
                    <div class="result-bar"><div id="bar-safe" class="result-bar-fill bg-green-500" style="width: 0%"></div></div>
                </div>
                <div class="text-right">
                    <div class="flex justify-between text-[10px] mb-1 font-bold text-gray-500 uppercase"><span>القلق</span><span id="pct-anxious">0%</span></div>
                    <div class="result-bar"><div id="bar-anxious" class="result-bar-fill bg-amber-500" style="width: 0%"></div></div>
                </div>
                <div class="text-right">
                    <div class="flex justify-between text-[10px] mb-1 font-bold text-gray-500 uppercase"><span>التجنبي</span><span id="pct-avoidant">0%</span></div>
                    <div class="result-bar"><div id="bar-avoidant" class="result-bar-fill bg-blue-500" style="width: 0%"></div></div>
                </div>
                <div class="text-right">
                    <div class="flex justify-between text-[10px] mb-1 font-bold text-gray-500 uppercase"><span>المضطرب</span><span id="pct-disorganized">0%</span></div>
                    <div class="result-bar"><div id="bar-disorganized" class="result-bar-fill bg-rose-500" style="width: 0%"></div></div>
                </div>
            </div>

            <div class="text-right bg-indigo-50/30 p-5 rounded-xl border border-indigo-50 mb-8">
                <p id="result-analysis" class="text-xs text-gray-600 leading-relaxed"></p>
            </div>

            <div class="border-t border-gray-100 pt-6 flex flex-col items-center">
                <div class="logo-container mb-3 shadow-sm">
                    <img src="johndoe_3.jpg" alt="John Doe" class="logo-small" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-[10px] font-bold text-indigo-400\'>JD</span>'">
                </div>
                <p class="text-[10px] text-gray-400">— John Doe</p>
            </div>
        </div>
    </div>

    <script>
        // دمج الأسئلة الأساسية (60) + كشف التجميل (6) + التناقض (6)
        const baseQuestions = [
            { cat: "القرب العاطفي", text: "أشعر بالراحة عندما أكون قريباً عاطفياً من شخص أحبه.", type: "safe", pair: 1 },
            { cat: "القرب العاطفي", text: "أفضل أن أحتفظ بمسافة عاطفية حتى داخل العلاقة.", type: "avoidant" },
            { cat: "القرب العاطفي", text: "أستمتع بمشاركة مشاعري العميقة مع الشريك.", type: "safe" },
            { cat: "القرب العاطفي", text: "عندما يقترب مني شخص كثيراً، أشعر بالحاجة للابتعاد.", type: "avoidant" },
            { cat: "القرب العاطفي", text: "القرب العاطفي يجعلني أشعر بالأمان.", type: "safe" },
            { cat: "القرب العاطفي", text: "أشعر أحياناً أن الآخرين يريدون قرباً أكثر مما أريد.", type: "avoidant" },
            { cat: "الخوف من الهجر", text: "أخاف أن يتركني الشخص الذي أحبه.", type: "anxious" },
            { cat: "الخوف من الهجر", text: "أقلق عندما لا يرد الشريك بسرعة.", type: "anxious" },
            { cat: "الخوف من الهجر", text: "أشعر بالاطمئنان في استقرار العلاقة.", type: "safe" },
            { cat: "الخوف من الهجر", text: "أحتاج إلى تأكيد متكرر أنني محبوب.", type: "anxious" },
            { cat: "الخوف من الهجر", text: "أشعر بالقلق عندما يبدو الشريك بعيداً.", type: "anxious" },
            { cat: "الخوف من الهجر", text: "أخاف أن لا أكون مهماً بما يكفي.", type: "anxious" },
            { cat: "الحاجة للتطمين", text: "أحتاج إلى كلمات أو أفعال تؤكد حب الشريك.", type: "anxious" },
            { cat: "الحاجة للتطمين", text: "أفكر كثيراً في مشاعر الشريك تجاهي.", type: "anxious" },
            { cat: "الحاجة للتطمين", text: "أشعر بالهدوء حتى بدون تأكيد مستمر.", type: "safe" },
            { cat: "الحاجة للتطمين", text: "أفسر بعض التصرفات على أنها ابتعاد.", type: "anxious" },
            { cat: "الحاجة للتطمين", text: "أبحث عن إشارات تدل أن العلاقة قوية.", type: "anxious" },
            { cat: "الحاجة للتطمين", text: "أتأثر بسرعة بتغير مزاج الشريك.", type: "anxious" },
            { cat: "الثقة في العلاقات", text: "أجد أنه من السهل الوثوق بالآخرين.", type: "safe", pair: 2 },
            { cat: "الثقة في العلاقات", text: "أفضل الاعتماد على نفسي بدل الآخرين.", type: "avoidant" },
            { cat: "الثقة في العلاقات", text: "أشعر بالراحة عند طلب الدعم العاطفي.", type: "safe" },
            { cat: "الثقة في العلاقات", text: "أخاف أن الاعتماد على الآخرين قد يجرحني.", type: "avoidant" },
            { cat: "الثقة في العلاقات", text: "أعتقد أن العلاقات يمكن أن تكون آمنة.", type: "safe" },
            { cat: "الثقة في العلاقات", text: "أتجنب إظهار ضعفي.", type: "avoidant" },
            { cat: "تجنب القرب", text: "أشعر براحة أكبر مع وجود مسافة عاطفية.", type: "avoidant" },
            { cat: "تجنب القرب", text: "عندما تصبح العلاقة عميقة، أميل للابتعاد.", type: "avoidant" },
            { cat: "تجنب القرب", text: "لا أحب الاعتماد العاطفي على الآخرين.", type: "avoidant" },
            { cat: "تجنب القرب", text: "أفضل حل مشاكلي وحدي.", type: "avoidant" },
            { cat: "تجنب القرب", text: "القرب الزائد يجعلني أشعر بالضغط.", type: "avoidant" },
            { cat: "تجنب القرب", text: "أتجنب الحديث عن مشاعري.", type: "avoidant" },
            { cat: "الاستقلال العاطفي", text: "الاستقلال مهم لي حتى داخل العلاقة.", type: "none" },
            { cat: "الاستقلال العاطفي", text: "لا أحب أن أبدو بحاجة للآخرين.", type: "avoidant" },
            { cat: "الاستقلال العاطفي", text: "أستطيع الموازنة بين القرب والاستقلال.", type: "safe" },
            { cat: "الاستقلال العاطفي", text: "الاعتماد على الآخرين قد يؤدي لخيبة أمل.", type: "avoidant" },
            { cat: "الاستقلال العاطفي", text: "أستطيع أن أحب دون فقدان نفسي.", type: "safe" },
            { cat: "الاستقلال العاطفي", text: "أشعر براحة أكبر عندما أعتمد على نفسي فقط.", type: "avoidant" },
            { cat: "الخوف من الاعتماد", text: "أخاف أن أتأذى إذا وثقت كثيراً.", type: "disorganized" },
            { cat: "الخوف من الاعتماد", text: "أشعر أن إظهار ضعفي خطر.", type: "disorganized" },
            { cat: "الخوف من الاعتماد", text: "أتجنب التعلق حتى لا أتألم.", type: "disorganized" },
            { cat: "الخوف من الاعتماد", text: "أشعر بالأمان عندما أعتمد على شخص موثوق.", type: "safe" },
            { cat: "الخوف من الاعتماد", text: "أفضل أن لا أحتاج أحداً كثيراً.", type: "avoidant" },
            { cat: "الخوف من الاعتماد", text: "أبتعد أحياناً عندما تصبح العلاقة مهمة.", type: "disorganized" },
            { cat: "ردود الفعل العاطفية", text: "عندما أشعر بالابتعاد، أحاول التقرب أكثر.", type: "anxious" },
            { cat: "ردود الفعل العاطفية", text: "عندما يقترب الشريك كثيراً، أحتاج مساحة.", type: "avoidant" },
            { cat: "ردود الفعل العاطفية", text: "أستطيع الحفاظ على هدوئي في الخلاف.", type: "safe" },
            { cat: "ردود الفعل العاطفية", text: "أشعر أحياناً أنني أحب أكثر مما يُحبني الآخر.", type: "anxious" },
            { cat: "ردود الفعل العاطفية", text: "العلاقات العميقة تعطي حياتي معنى.", type: "safe" },
            { cat: "ردود الفعل العاطفية", text: "قد أبتعد عن الشريك رغم أنني بحاجة إليه.", type: "disorganized" },
            { cat: "التعلق المضطرب", text: "أريد القرب لكن أخاف منه.", type: "disorganized" },
            { cat: "التعلق المضطرب", text: "أشعر بالتردد بين الاقتراب والابتعاد.", type: "disorganized" },
            { cat: "التعلق المضطرب", text: "أقترب ثم أبتعد بدون سبب واضح.", type: "disorganized" },
            { cat: "التعلق المضطرب", text: "أشعر بالتوتر عندما تصبح العلاقة مهمة جداً.", type: "disorganized" },
            { cat: "التعلق المضطرب", text: "أحتاج القرب لكن أخاف فقدان حريتي.", type: "disorganized" },
            { cat: "التعلق المضطرب", text: "أتصرف أحياناً بعكس ما أشعر به.", type: "disorganized" },
            { cat: "الاستحقاق والاستقرار", text: "أشعر أنني أستحق الحب.", type: "safe" },
            { cat: "الاستحقاق والاستقرار", text: "أخاف أن يكتشف الشريك عيوبي ويبتعد.", type: "anxious" },
            { cat: "الاستحقاق والاستقرار", text: "أثق أن العلاقة يمكن أن تستمر.", type: "safe" },
            { cat: "الاستحقاق والاستقرار", text: "أشعر أحياناً أنني لست كافياً.", type: "anxious" },
            { cat: "الاستحقاق والاستقرار", text: "أشعر بالاستقرار في العلاقات.", type: "safe" },
            { cat: "الاستحقاق والاستقرار", text: "أفضل كبت مشاعري بدل التعبير عنها.", type: "avoidant" }
        ];

        const lieQuestions = [
            { cat: "مقياس الصدق", text: "لم يسبق لي أبداً أن غضبت من شخص أحبه.", type: "lie" },
            { cat: "مقياس الصدق", text: "أنا دائماً صادق تماماً مع شريكي في كل شيء.", type: "lie" },
            { cat: "مقياس الصدق", text: "لم يسبق لي أن شعرت بالغيرة أبداً.", type: "lie" },
            { cat: "مقياس الصدق", text: "أنا دائماً أضع احتياجات الآخرين قبل احتياجاتي.", type: "lie" },
            { cat: "مقياس الصدق", text: "لم أفعل أبداً أي شيء أناني في علاقاتي.", type: "lie" },
            { cat: "مقياس الصدق", text: "أنا دائماً أسامح فوراً وبسهولة تامة.", type: "lie" }
        ];

        const consistencyQuestions = [
            { cat: "التناقض", text: "أحياناً أشعر بالخوف من الهجر والوحدة.", type: "anxious", pair: 1 },
            { cat: "التناقض", text: "أعتقد أن معظم الناس لا يمكن الوثوق بهم فعلياً.", type: "avoidant", pair: 2 }
        ];

        const questions = [...baseQuestions, ...lieQuestions, ...consistencyQuestions];
        let currentIdx = 0;
        let userAnswers = [];

        function startQuiz() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQ();
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('category-name').innerText = q.cat;
            document.getElementById('q-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
            window.scrollTo(0, 0);
        }

        function recordAnswer(v) {
            userAnswers.push({ type: questions[currentIdx].type, val: v, pair: questions[currentIdx].pair });
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQ();
            } else {
                processResults();
            }
        }

        function processResults() {
            let scores = { safe: 0, anxious: 0, avoidant: 0, disorganized: 0, lie: 0 };
            let counts = { safe: 0, anxious: 0, avoidant: 0, disorganized: 0, lie: 0 };
            
            userAnswers.forEach(a => {
                if(scores.hasOwnProperty(a.type)) {
                    scores[a.type] += a.val;
                    counts[a.type]++;
                }
            });

            let lieScore = scores.lie / (counts.lie * 5); 
            let inconsistencyCount = 0;
            const pair1 = userAnswers.filter(a => a.pair === 1);
            if (pair1.length === 2 && Math.abs(pair1[0].val - pair1[1].val) > 2) inconsistencyCount++;

            let confidenceLevel = "عالية";
            let confidenceClass = "bg-green-100 text-green-700";
            
            if (lieScore > 0.7 || inconsistencyCount > 0) {
                confidenceLevel = "متوسطة";
                confidenceClass = "bg-amber-100 text-amber-700";
            }
            if (lieScore > 0.9) {
                confidenceLevel = "تحتاج لمراجعة";
                confidenceClass = "bg-rose-100 text-rose-700";
            }

            const getPct = (t) => Math.round((scores[t] / (counts[t] * 5)) * 100);
            const res = { safe: getPct('safe'), anxious: getPct('anxious'), avoidant: getPct('avoidant'), disorganized: getPct('disorganized') };

            displayResults(res, confidenceLevel, confidenceClass);
        }

        function displayResults(res, conf, confClass) {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const badge = document.getElementById('confidence-badge');
            badge.innerText = "دقة التحليل: " + conf;
            badge.className = "inline-block px-3 py-1 rounded-full text-[10px] font-bold mb-6 " + confClass;

            ['safe', 'anxious', 'avoidant', 'disorganized'].forEach(t => {
                document.getElementById(`pct-${t}`).innerText = res[t] + "%";
                document.getElementById(`bar-${t}`).style.width = res[t] + "%";
            });

            let primary = 'safe';
            if (res.anxious > res[primary]) primary = 'anxious';
            if (res.avoidant > res[primary]) primary = 'avoidant';
            if (res.disorganized > res[primary]) primary = 'disorganized';

            const titles = { safe: "النمط الآمن", anxious: "النمط القلق", avoidant: "النمط التجنبي", disorganized: "النمط المضطرب" };
            document.getElementById('primary-style').innerText = titles[primary];

            let analysis = "بناءً على إجاباتك، يظهر تحليلك ميلاً لـ " + titles[primary] + ". ";
            if(res.safe < 40) analysis += "قد تحتاج للعمل على بناء الأمان العاطفي في علاقاتك. ";
            
            document.getElementById('result-analysis').innerText = analysis;
        }
    </script>
</body>
</html>
